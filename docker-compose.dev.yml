# Local backing services for `crates/server`. Not for production.
#   docker compose -f docker-compose.dev.yml up -d
services:
  postgres:
    image: postgres:16-alpine
    # 5433 on the host so it never clashes with a system Postgres on 5432.
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: stakedev
      POSTGRES_PASSWORD: stakedev
      POSTGRES_DB: stakedev
    volumes:
      - stakedev_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stakedev -d stakedev"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - stakedev_minio:/data
    # curl was dropped from the image; the server ships `mc` with a `local`
    # alias, so `mc ready local` is the supported readiness probe.
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: wait for MinIO, then ensure the dev bucket exists and exit.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/stake-dev
      "

volumes:
  stakedev_pg:
  stakedev_minio:
