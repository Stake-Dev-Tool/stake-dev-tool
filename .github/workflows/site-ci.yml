name: Site CI

on:
  push:
    branches: [v2]
    paths:
      - 'site/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/site-ci.yml'
  pull_request:
    branches: [v2, main]
    paths:
      - 'site/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - '.github/workflows/site-ci.yml'

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile --filter site

      - run: pnpm --filter site exec tsc --noEmit

      - run: pnpm --filter site build
