name: sdt Release

# Prebuilt CLI binaries: tag `sdt-vX.Y.Z` and this attaches sdt for the three
# desktop platforms to a GitHub release of that tag.
on:
  push:
    tags: ['sdt-v*']

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: sdt
            asset: sdt-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: sdt.exe
            asset: sdt-windows-x64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: sdt
            asset: sdt-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        shell: bash
        run: |
          rustup update stable --no-self-update
          rustup default stable
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release -p cli --target ${{ matrix.target }}

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release with assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --notes "Prebuilt \`sdt\` CLI binaries. Install docs: https://stakedevtool.com/cli" \
            dist/*
