name: Server CI

# Paths cover everything that ends up in the production server image
# (deploy/Dockerfile): crates/{server,protocol,lgs} + the embedded ui/ build
# (test view, include_dir'd into lgs) + web/ (dashboard, served at runtime).
on:
  push:
    branches: [main]
    paths:
      - 'crates/server/**'
      - 'crates/protocol/**'
      - 'crates/lgs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'docker-compose.dev.yml'
      - 'ui/**'
      - 'web/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'deploy/Dockerfile'
      - 'deploy/docker-compose.prod.yml'
      - '.github/workflows/server-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'crates/server/**'
      - 'crates/protocol/**'
      - 'crates/lgs/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'docker-compose.dev.yml'
      - 'ui/**'
      - 'web/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'package.json'
      - 'deploy/Dockerfile'
      - 'deploy/docker-compose.prod.yml'
      - '.github/workflows/server-ci.yml'

# PR runs are superseded by newer pushes; production pushes must NOT cancel
# each other (an in-flight deploy killed mid-build leaves nothing broken, but
# queuing is strictly safer and GitHub keeps only the newest pending run).
concurrency:
  group: server-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  server:
    runs-on: ubuntu-latest

    # crates/server + crates/protocol are pure Rust (axum + sqlx); they need no
    # webkit/GTK system deps, so this workflow intentionally installs no apt
    # packages. A real Postgres is provided so the sqlx-backed server tests run
    # instead of self-skipping.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: stakedev
          POSTGRES_PASSWORD: stakedev
          POSTGRES_DB: stakedev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U stakedev -d stakedev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust (stable + clippy + rustfmt)
        shell: bash
        run: |
          # Retry rustup to mitigate transient network failures on runners.
          for attempt in 1 2 3; do
            rustup update stable --no-self-update && break
            echo "rustup update attempt $attempt failed, retrying in 10s..." >&2
            sleep 10
          done
          rustup default stable
          rustup component add clippy rustfmt
          rustc --version

      - uses: Swatinem/rust-cache@v2

      - run: cargo fmt -p server -p protocol -- --check

      - run: cargo clippy -p server -p protocol --all-targets -- -D warnings

      - name: Run tests
        env:
          DATABASE_URL: postgres://stakedev:stakedev@localhost:5432/stakedev
          TEST_DATABASE_URL: postgres://stakedev:stakedev@localhost:5432/stakedev
        run: cargo test -p server -p protocol

      - name: TypeScript bindings are fresh (protocol)
        shell: bash
        run: |
          # `cargo test -p protocol` (run in the test step above) regenerates the
          # ts-rs TypeScript bindings into ui/src/lib/protocol/. If the committed
          # bindings differ from what was just generated, the working tree is dirty.
          # git diff catches modified tracked bindings; git status --porcelain also
          # catches brand-new (untracked) binding files, which git diff would miss.
          changed=$(git status --porcelain -- ui/src/lib/protocol)
          if ! git diff --exit-code -- ui/src/lib/protocol || [ -n "$changed" ]; then
            echo "::error::TypeScript bindings are out of date. Run 'cargo test -p protocol' and commit the changes under ui/src/lib/protocol/."
            echo "Changed / untracked binding files:"
            git status --porcelain -- ui/src/lib/protocol
            exit 1
          fi

  # The dashboard SPA the server binary embeds. Kept in the same workflow so a
  # protocol change that breaks web/ fails the same CI run.
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile --filter web

      - run: pnpm --filter web check

      - run: pnpm --filter web build

  # Starts the image build on the box the moment the push lands, in parallel
  # with the test jobs. Build-only: sdt-deploy tags the image per sha and
  # never touches the running server; nothing is activated until the deploy
  # job (gated on green tests) flips the container over. Deliberately NOT in
  # deploy's concurrency group: GitHub keeps only the newest pending job per
  # group, so a queued deploy could get evicted by a newer prebuild — mutual
  # exclusion on the box is flock's job (inside sdt-deploy), not GitHub's.
  prebuild:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    concurrency:
      group: prebuild-server-production
      cancel-in-progress: false
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key (public info) — no TOFU at deploy time.
          echo "${{ secrets.DEPLOY_HOST }} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC0krTebHIHj/s+RFaCCdLfgGXXPtSa/IVfBiWCftl+8" > ~/.ssh/known_hosts

      - name: Prebuild ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=40 \
            root@${{ secrets.DEPLOY_HOST }} "build ${{ github.sha }}"

  # Continuous deployment: every green push to main activates the image the
  # prebuild job built in parallel with the tests (sdt-deploy rebuilds it
  # first if the prebuild failed or is still running — flock makes this SSH
  # wait its turn). The SSH key is locked to a forced command on the box
  # (/usr/local/bin/sdt-deploy, versioned at deploy/sdt-deploy) that only
  # accepts "<sha>" or "build <sha>" where <sha> is a full commit sha already
  # on origin/main — it cannot open a shell or run anything else. Caddy is
  # left untouched (recreating it drops live connections); deploy/Caddyfile
  # changes remain a rare manual step, see deploy/README.md.
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [server, web]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://app.stakedevtool.com
    concurrency:
      group: deploy-server-production
      cancel-in-progress: false
    steps:
      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Pinned host key (public info) — no TOFU at deploy time.
          echo "${{ secrets.DEPLOY_HOST }} ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIC0krTebHIHj/s+RFaCCdLfgGXXPtSa/IVfBiWCftl+8" > ~/.ssh/known_hosts

      - name: Deploy ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -o ServerAliveInterval=30 -o ServerAliveCountMax=40 \
            root@${{ secrets.DEPLOY_HOST }} "${{ github.sha }}"

      - name: Verify prod is running this commit
        run: |
          short=$(echo "${{ github.sha }}" | cut -c1-7)
          build=$(curl -fsS https://app.stakedevtool.com/healthz | jq -r .build)
          echo "prod build: $build (expected: $short)"
          [[ "$build" == "$short"* ]]
